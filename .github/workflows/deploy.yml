name: Deploy Hakyll site

on:
    push:
        branches: [main]
        paths:
            - "blog/**"
            - ".github/workflows/deploy.yml"

    # allow manual trigger
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# only one deploy at a time
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: haskell-actions/setup@v2
              with:
                  ghc-version: "9.6"
                  cabal-version: "3.10"

            - name: Cache cabal packages
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cabal/store
                      blog/dist-newstyle
                  key: ${{ runner.os }}-cabal-${{ hashFiles('blog/metasonic-blog.cabal') }}
                  restore-keys: ${{ runner.os }}-cabal-

            - name: Build site generator
              working-directory: blog
              run: cabal build

            - name: Generate site
              working-directory: blog
              run: cabal run metasonic-blog -- build

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: blog/_site

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
