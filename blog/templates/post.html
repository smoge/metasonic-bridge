<article>
    <div class="post-meta">
        <span class="post-date">$date$</span>
        $if(author)$· <span class="post-author">$author$</span>$endif$
        $if(tags)$
        <br><span class="post-tags">Tags: $tags$</span>
        $endif$
    </div>

    <section class="post-body">
        $body$
    </section>
</article>
